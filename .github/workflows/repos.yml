name: Build Packages Repositories

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check_repo:
    runs-on: ubuntu-latest
    outputs:
      is_main_repo: ${{ steps.check.outputs.is_main_repo }}
    steps:
      - id: check
        run: |
          if [[ "$GITHUB_REPOSITORY" == "kakwa/pakste" ]]; then
            echo "is_main_repo=true" >> $GITHUB_OUTPUT
          else
            echo "is_main_repo=false" >> $GITHUB_OUTPUT
          fi
          echo "Repository: $GITHUB_REPOSITORY"

  build:
    needs: check_repo
    if: github.ref == 'refs/heads/main' && needs.check_repo.outputs.is_main_repo == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install GPG Key
        run: |
          echo "${{ secrets.GPG_SIGNING_KEY }}" | gpg --import

      - name: Install Dependencies
        run: |
          wget -qO - https://mirror.kakwalab.ovh/debian-rpm-build-tools/GPG-KEY.pub | gpg --dearmor > kakwalab.gpg
          sudo install -o root -g root -m 644 kakwalab.gpg /etc/apt/trusted.gpg.d/
          echo "deb [arch=amd64] https://mirror.kakwalab.ovh/debian-rpm-build-tools/deb.noble/ noble main" | sudo tee /etc/apt/sources.list.d/kakwalab-rpm-build-tools.list
          sudo apt update
          sudo apt install -y make debhelper reprepro cowbuilder wget
          sudo apt install -y binfmt-support qemu-utils qemu-user-static qemu-system-arm qemu-system-misc
          sudo apt install -y debian-archive-keyring debian-keyring debian-ports-archive-keyring ubuntu-keyring
          sudo apt install -y mock createrepo-c rpm dnf

      - name: Create Tmpfs
        run: |
          mount -t tmpfs -o size=16G tmpfs /var/cache/pbuilder/

      - name: Recover Existing Published Repositories Content
        run: |
          mkdir -p out
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "Recovering existing repositories content for $REPO_NAME..."
          # Clone the gh-pages branch into a temporary directory
          git clone --branch=gh-pages --single-branch --depth=1 https://github.com/${GITHUB_REPOSITORY}.git gh-pages-temp || true
          # If the clone was successful, copy all contents to out directory
          if [ -d "gh-pages-temp" ]; then
            cp -r gh-pages-temp/* out/ 2>/dev/null || true
            rm -rf gh-pages-temp
            echo "Successfully recovered existing repositories content"
          else
            echo "No existing repositories content found or branch doesn't exist yet"
          fi

      - name: Build Repositories
        run: make all_repos -j8

      - name: Deploy Repositories to GitHub Pages
        if: ${{ github.event_name != 'pull_request' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
